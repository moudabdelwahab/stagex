<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">

    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 5px;
        }
        .password-toggle svg {
            width: 20px;
            height: 20px;
        }
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding-left: 40px;
        }
    </style>

    <script>
        (function () {
            try {
                var theme =
                    localStorage.getItem('theme-preference') ||
                    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    
    <script src="theme-manager.js" defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-wrapper">

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="/assets/images/logo.png" alt="Logo" class="logo-image">
            <span>منصة مدعوم</span>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="theme-toggle" aria-label="Toggle theme" title="تبديل الوضع الليلي/النهاري">
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
            <ul class="nav-menu" style="display: flex; gap: 1.5rem; list-style: none; margin: 0; padding: 0;">
                <li><a href="index.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">الرئيسية</a></li>
                <li><a href="sign-in.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s; font-weight: 600; border-bottom: 2px solid var(--color-nav-text);">تسجيل الدخول</a></li>
                <li><a href="sign-up.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">حساب جديد</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="auth-container">
    <section class="auth-card">
        <h1>تسجيل الدخول</h1>
        <p class="auth-subtitle">سجل دخولك للوصول إلى لوحة التحكم الخاصة بك</p>

        <div id="successMessage" class="message-box message-success" style="display:none;">
            <p>تم تسجيل الدخول بنجاح! جاري التحويل...</p>
        </div>

        <div id="errorMessage" class="message-box message-error" style="display:none;">
            <p id="errorText"></p>
        </div>

        <button id="resendEmailBtn"
                class="btn btn-secondary"
                style="display:none; margin-top:10px;">
            إعادة إرسال رسالة تأكيد البريد الإلكتروني
        </button>

        <form id="signInForm">
            <div class="form-group">
                <label for="identifier">البريد الإلكتروني أو اسم المستخدم</label>
                <input type="text" id="identifier" placeholder="أدخل بريدك الإلكتروني أو اسم المستخدم" required>
            </div>

            <div class="form-group">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <label for="password">كلمة المرور</label>
                    <a href="forgot-password.html"
                       style="font-size:.85rem;color:var(--primary-color);text-decoration:none;">
                        نسيت كلمة المرور؟
                    </a>
                </div>

                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                    <button type="button"
                            class="password-toggle"
                            id="togglePassword"
                            aria-label="إظهار كلمة المرور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Cloudflare Turnstile CAPTCHA -->
            <div class="form-group" style="margin-top: 1.5rem;">
                <div class="cf-turnstile" 
                     data-sitekey="1x00000000000000000000AA"
                     data-theme="light"
                     data-size="normal"
                     id="turnstile-login"></div>
                <div id="turnstileError" class="message-box message-error" style="display:none; margin-top: 0.5rem;">
                    <p>يرجى إكمال التحقق من CAPTCHA</p>
                </div>
            </div>

            <div class="auth-actions">
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginBtnText">تسجيل الدخول</span>
                    <span id="loginBtnLoader" style="display:none;">جاري التحقق...</span>
                </button>
                <button type="button" class="btn btn-secondary" id="guestLoginBtn" style="margin-top: 1rem; width: 100%;">
                    الدخول كضيف (عرض محدود)
                </button>
            </div>
        </form>

        <p class="auth-footer-text">
            لا تملك حساباً؟ <a href="sign-up-new.html">أنشئ حساباً جديداً</a>
        </p>
    </section>
</main>

    <script type="module">
import { supabase } from './api-config.js';
import { signIn, signInAsGuest, onAuthStateChange } from './auth-client.js';
import { getTurnstileToken, resetTurnstile } from './turnstile-config.js';

const form = document.getElementById('signInForm');
const submitBtn = document.getElementById('loginBtn');
const btnText = document.getElementById('loginBtnText');
const btnLoader = document.getElementById('loginBtnLoader');
const errorMessage = document.getElementById('errorMessage');
const errorText = document.getElementById('errorText');
const successMessage = document.getElementById('successMessage');
const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const resendBtn = document.getElementById('resendEmailBtn');
const guestLoginBtn = document.getElementById('guestLoginBtn');

let isLoggingIn = false;
let isRedirecting = false;

function redirectOnce(targetPage) {
    if (isRedirecting) return;
    isRedirecting = true;
    window.location.replace(targetPage);
}

async function redirectByProfileRole(userId) {
    const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', userId)
        .maybeSingle();

    const role = profile?.role || 'customer';
    const targetPage = (role === 'admin' || role === 'support' || role === 'super_user')
        ? 'admin-dashboard.html'
        : 'customer-dashboard.html';

    redirectOnce(targetPage);
}

// توجيه المستخدم المسجل مسبقاً مرة واحدة فقط
(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
        await redirectByProfileRole(session.user.id);
    }
})();

// حماية إضافية ضد تعارض signIn مع مستمع المصادقة
onAuthStateChange(async (event, session) => {
    if (event !== 'SIGNED_IN' || !session?.user || isLoggingIn || isRedirecting) return;
    await redirectByProfileRole(session.user.id);
});

// إظهار / إخفاء كلمة المرور
togglePassword.addEventListener('click', () => {
    passwordInput.type =
        passwordInput.type === 'password' ? 'text' : 'password';
});

function setLoading(state) {
    submitBtn.disabled = state;
    btnText.style.display = state ? 'none' : 'inline';
    btnLoader.style.display = state ? 'inline' : 'none';
}

// تسجيل الدخول
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    isLoggingIn = true;

    setLoading(true);
    errorMessage.style.display = 'none';
    resendBtn.style.display = 'none';
    document.getElementById('turnstileError').style.display = 'none';

    // التحقق من Turnstile Token
    const turnstileToken = await getTurnstileToken();
    if (!turnstileToken) {
        isLoggingIn = false;
        setLoading(false);
        document.getElementById('turnstileError').style.display = 'block';
        resetTurnstile();
        return;
    }

    const identifier = document.getElementById('identifier').value;
    const password = passwordInput.value;

    try {
        console.log('[AuthDebug] Attempting sign in for:', identifier);
        const result = await signIn(identifier, password, { turnstileToken });
        if (result.error) throw result.error;

        if (result.requires2FA) {
            console.log('[AuthDebug] 2FA required, redirecting to verification page...');
            window.location.replace('2fa-verify.html');
            return;
        }

        if (result.requiresTelegramOTP) {
            console.log('[AuthDebug] Telegram OTP required, redirecting to verification page...');
            window.location.replace('telegram-otp.html');
            return;
        }

        console.log('[AuthDebug] Sign in successful, redirecting based on role...');
        successMessage.style.display = 'block';

        const userId = result?.data?.user?.id;
        if (!userId) throw new Error('تعذر تحديد المستخدم بعد تسجيل الدخول.');
        await redirectByProfileRole(userId);

    } catch (err) {
        isLoggingIn = false;
        setLoading(false);
        errorMessage.style.display = 'block';
        resetTurnstile();

        if (
            err.message === 'Email not confirmed' ||
            err.message?.toLowerCase().includes('confirm') ||
            err.message?.toLowerCase().includes('verify')
        ) {
            errorText.textContent =
                'بريدك الإلكتروني غير مفعل. من فضلك فعّل الحساب من خلال الإيميل.';
            resendBtn.style.display = 'block';

            resendBtn.onclick = async () => {
                resendBtn.disabled = true;
                resendBtn.textContent = 'جاري إرسال رسالة التأكيد...';
                // في حالة تسجيل الدخول باسم المستخدم، نحتاج للبريد الإلكتروني لإعادة الإرسال
                let emailToSend = identifier;
                if (!identifier.includes('@')) {
                    const { data: profile } = await supabase.from('profiles').select('email').eq('username', identifier).maybeSingle();
                    if (profile?.email) emailToSend = profile.email;
                }
                await supabase.auth.resend({ type: 'signup', email: emailToSend });
                resendBtn.textContent = 'تم إرسال رسالة التأكيد 📩';
            };

        } else if (err.message === 'Invalid login credentials') {
            errorText.textContent = 'البريد الإلكتروني/اسم المستخدم أو كلمة المرور غير صحيحة.';
        } else {
            // عرض الرسالة القادمة من auth-client.js (مثل رسائل الحظر المفصلة)
            errorText.style.whiteSpace = 'pre-line';
            errorText.textContent = err.message || 'فشل تسجيل الدخول. حاول مرة أخرى.';
        }
    }
});

// الدخول كضيف
guestLoginBtn.addEventListener('click', async () => {
    try {
        setLoading(true);
        await signInAsGuest();
        successMessage.style.display = 'block';
        successMessage.querySelector('p').textContent = 'تم الدخول كضيف بنجاح! جاري التحويل...';
        setTimeout(() => {
            window.location.replace('customer-dashboard.html');
        }, 1000);
    } catch (err) {
        setLoading(false);
        errorMessage.style.display = 'block';
        errorText.textContent = 'فشل الدخول كضيف. حاول مرة أخرى.';
    }
});

// ملاحظة: التوجيه الآن موحّد عبر redirectByProfileRole + redirectOnce
// لمنع أي Redirect Loop أو تنفيذ مزدوج للتوجيه
</script>

</body>
</html>
