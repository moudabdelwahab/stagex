<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التذاكر - مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="robot.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #003366;
            --color-primary-variant: #0055AA;
            --color-accent: #0077CC;
            --color-background: #F5F5F5;
            --color-surface: #FFFFFF;
            --color-text: #333333;
            --color-text-secondary: #777777;
            --color-muted: #EEEEEE;
            --color-success: #2E8A3A;
            --color-warning: #E0A800;
            --color-danger: #D9534F;
            --color-border: #DDDDDD;
            --color-sidebar-bg: #002244;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--color-background); color: var(--color-text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .admin-nav { background: var(--color-primary); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow-sm); }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-right, .nav-left { display: flex; align-items: center; gap: 1rem; }
        .admin-logo { height: 35px; }
        .admin-title { font-weight: 800; color: #FFFFFF; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--color-sidebar-bg); color: white; z-index: 2000; transition: all 0.3s ease; display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; display: none; }
        .sidebar-overlay.active { display: block; }
        .sidebar-header { padding: 2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-menu { padding: 1rem 0; flex: 1; overflow-y: auto; }
        .sidebar-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 600; border-right: 4px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,0.05); color: white; border-right-color: var(--color-accent); }
        .menu-toggle { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; }
        .admin-main { flex: 1; padding: 2rem 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--color-surface); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm); }
        .stat-label { color: var(--color-text-secondary); margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--color-accent); }
        .table-container { background: var(--color-surface); border-radius: 1rem; border: 1px solid var(--color-border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--color-muted); padding: 1rem; text-align: right; font-weight: 700; }
        td { padding: 1rem; border-bottom: 1px solid var(--color-border); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 700; }
        .status-open { background: #FFF3CD; color: #856404; }
        .status-resolved { background: #D4EDDA; color: #155724; }
        .status-in_progress { background: #E0F2F1; color: #00796B; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; font-family: 'Cairo'; text-decoration: none; display: inline-block; font-size: 0.85rem; }
        .btn-primary { background: var(--color-accent); color: white; }
        .btn-outline { border: 1px solid var(--color-accent); color: var(--color-accent); background: transparent; }
        .avatar-circle { width: 35px; height: 35px; background: var(--color-accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .rating-stars { color: #ffcc00; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: 800;">لوحة الإدارة</span>
            <button id="sidebarClose" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <nav class="sidebar-menu">
            <a href="tickets.html" class="sidebar-item active">إدارة التذاكر</a>
            <a href="chat-admin.html" class="sidebar-item">محادثات العملاء</a>
            <a href="rewards.html" class="sidebar-item">إدارة المكافآت</a>
            <a href="users.html" class="sidebar-item">المستخدمين</a>
            <a href="banned.html" class="sidebar-item">المحظورين</a>
            <a href="stats.html" class="sidebar-item">الإحصائيات</a>
            <a href="activity-log.html" class="sidebar-item">سجل النشاطات</a>
        </nav>
    </aside>

    <nav class="admin-nav">
        <div class="nav-container">
            <div class="nav-right">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <img src="/assets/images/logo.png" alt="مدعوم" class="admin-logo">
                <span class="admin-title">إدارة التذاكر</span>
            </div>
            <div class="nav-left">
                <div class="avatar-circle" id="adminInitial">A</div>
            </div>
        </div>
    </nav>

    <main class="admin-main">
        <div class="stats-grid">
            <div class="stat-card"><p class="stat-label">إجمالي التذاكر</p><h2 id="admTotal" class="stat-value">0</h2></div>
            <div class="stat-card"><p class="stat-label">المفتوحة</p><h2 id="admOpen" class="stat-value" style="color: var(--color-warning);">0</h2></div>
            <div class="stat-card"><p class="stat-label">المحلولة</p><h2 id="admResolved" class="stat-value" style="color: var(--color-success);">0</h2></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>العميل</th><th>الموضوع</th><th>الحالة</th><th>التقييم</th><th>التاريخ</th><th>الإجراء</th></tr></thead>
                <tbody id="admTicketsBody"><tr><td colspan="6" style="text-align: center; padding: 2rem;">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { supabase } from './api-config.js';
        import { requireAuth, adminImpersonateUser } from './auth-client.js';
        import { fetchTicketStats, subscribeToTickets } from './tickets-service.js';

        async function init() {
            const user = await requireAuth('admin');
            if (!user) return;
            
            setupSidebar();
            renderTickets();
            subscribeToTickets(() => renderTickets());
        }

        function setupSidebar() {
            const toggle = () => {
                document.getElementById('sidebar').classList.toggle('active');
                document.getElementById('sidebarOverlay').classList.toggle('active');
            };
            document.getElementById('menuToggle').onclick = toggle;
            document.getElementById('sidebarClose').onclick = toggle;
            document.getElementById('sidebarOverlay').onclick = toggle;
        }

        async function renderTickets() {
            const { data: tickets } = await supabase
                .from('tickets')
                .select('*, profiles(full_name, email)')
                .order('created_at', { ascending: false });

            document.getElementById('admTicketsBody').innerHTML = tickets?.map(t => {
                const ratingHtml = t.rating ? `<div class="rating-stars">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</div>` : '<span style="color:#999; font-size:0.8rem;">لا يوجد</span>';
                const statusLabel = t.status === 'open' ? 'مفتوحة' : (t.status === 'resolved' ? 'محلولة' : 'قيد التنفيذ');
                
                return `
                <tr>
                    <td>
                        <div style="font-weight:700;">${t.profiles?.full_name || 'مستخدم ضيف'}</div>
                        <div style="font-size:0.75rem; color:#666;">${t.profiles?.email || 'بدون بريد'}</div>
                    </td>
                    <td>
                        <div style="font-weight:600;">${t.title}</div>
                        <div style="font-size:0.75rem; color:#888; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.description}</div>
                    </td>
                    <td><span class="status-badge status-${t.status}">${statusLabel}</span></td>
                    <td>${ratingHtml}</td>
                    <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                    <td style="display:flex; gap:0.5rem;">
                        <button class="btn btn-primary" onclick="impersonateUser('${t.user_id}')">عرض</button>
                        ${t.chat_session_id ? `<a href="chat-admin.html" class="btn btn-outline">المحادثة</a>` : ''}
                    </td>
                </tr>
            `}).join('') || '<tr><td colspan="6">لا توجد تذاكر</td></tr>';
            
            const stats = await fetchTicketStats();
            document.getElementById('admTotal').textContent = stats.total;
            document.getElementById('admOpen').textContent = stats.open;
            document.getElementById('admResolved').textContent = stats.resolved;
        }

        window.impersonateUser = async (id) => {
            if (!id) {
                alert('لا يمكن الدخول لحساب ضيف');
                return;
            }
            await adminImpersonateUser(id);
            location.href = 'customer-dashboard.html';
        };

        init();
    </script>
</body>
</html>
