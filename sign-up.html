<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 5px;
        }
        .password-toggle svg {
            width: 20px;
            height: 20px;
        }
        input[type="password"], input[type="text"], input[type="email"] {
            width: 100%;
            padding-left: 40px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .username-status {
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
        }
        .username-available { color: #10b981; }
        .username-taken { color: #ef4444; }
    </style>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
</head>
<body class="auth-wrapper">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="/assets/images/logo.png" alt="Logo" class="logo-image">
                <span>منصة مدعوم</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme" title="تبديل الوضع الليلي/النهاري">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <ul class="nav-menu" style="display: flex; gap: 1.5rem; list-style: none; margin: 0; padding: 0;">
                    <li><a href="index.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">الرئيسية</a></li>
                    <li><a href="sign-in.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">تسجيل الدخول</a></li>
                    <li><a href="sign-up.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s; font-weight: 600; border-bottom: 2px solid var(--color-nav-text);">حساب جديد</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <section class="auth-card">
            <h1>إنشاء حساب جديد</h1>
            <p class="auth-subtitle">انضم إلينا اليوم للحصول على أفضل دعم فني</p>

            <div id="successMessage" class="message-box message-success" style="display: none;">
                <p>تم إنشاء الحساب بنجاح! جاري التحويل...</p>
            </div>

            <div id="errorMessage" class="message-box message-error" style="display: none;">
                <p id="errorText"></p>
            </div>

            <form id="signUpForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول</label>
                        <input type="text" id="firstName" placeholder="الاسم الأول" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">الاسم الأخير</label>
                        <input type="text" id="lastName" placeholder="الاسم الأخير" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" placeholder="اختر اسم مستخدم فريد" required pattern="^[a-zA-Z0-9_]{3,20}$" title="يجب أن يتكون من 3-20 حرفاً أو رقماً أو شرطة سفلية">
                    <div id="usernameStatus" class="username-status"></div>
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="password" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <small class="form-help">يجب أن لا تقل عن 8 أحرف.</small>
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">تأكيد كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordConfirm" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="passwordConfirm" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary" id="signUpBtn">
                        <span id="signUpBtnText">إنشاء الحساب</span>
                        <span id="signUpBtnLoader" style="display: none;">جاري الإنشاء...</span>
                    </button>
                </div>
            </form>
            <p class="auth-footer-text">لديك حساب بالفعل؟ <a href="sign-in.html">سجل دخولك هنا</a></p>
        </section>
    </main>

    <script type="module">
        import { signUp, checkUsernameAvailability } from './auth-client.js';

        const form = document.getElementById('signUpForm');
        const submitBtn = document.getElementById('signUpBtn');
        const btnText = document.getElementById('signUpBtnText');
        const btnLoader = document.getElementById('signUpBtnLoader');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const usernameInput = document.getElementById('username');
        const usernameStatus = document.getElementById('usernameStatus');

        let isUsernameAvailable = false;
        let debounceTimer;

        // التحقق من توفر اسم المستخدم
        usernameInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const username = usernameInput.value.trim();
            
            if (username.length < 3) {
                usernameStatus.style.display = 'none';
                isUsernameAvailable = false;
                return;
            }

            usernameStatus.style.display = 'block';
            usernameStatus.className = 'username-status';
            usernameStatus.textContent = 'جاري التحقق...';

            debounceTimer = setTimeout(async () => {
                const { available, error } = await checkUsernameAvailability(username);
                
                if (error) {
                    usernameStatus.textContent = 'خطأ في التحقق';
                    isUsernameAvailable = false;
                    return;
                }

                if (available) {
                    usernameStatus.textContent = 'اسم المستخدم متاح';
                    usernameStatus.classList.add('username-available');
                    isUsernameAvailable = true;
                } else {
                    usernameStatus.textContent = 'اسم المستخدم محجوز مسبقاً';
                    usernameStatus.classList.add('username-taken');
                    isUsernameAvailable = false;
                }
            }, 500);
        });

        // ميزة إظهار كلمة المرور
        document.addEventListener('click', (e) => {
            const button = e.target.closest('.password-toggle');
            if (!button) return;
            
            e.preventDefault();
            const targetId = button.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;

            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            
            if (type === 'text') {
                button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            } else {
                button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (!isUsernameAvailable) {
                errorMessage.style.display = 'block';
                errorText.textContent = 'يرجى اختيار اسم مستخدم متاح';
                usernameInput.focus();
                return;
            }

            if (password !== passwordConfirm) {
                errorMessage.style.display = 'block';
                errorText.textContent = 'كلمتا المرور غير متطابقتين';
                return;
            }

            setLoading(true);
            errorMessage.style.display = 'none';

            try {
                const { data, error } = await signUp(email, password, {
                    first_name: firstName,
                    last_name: lastName,
                    username: username
                });
                
                if (error) throw error;

                // إخفاء النموذج وإظهار رسالة النجاح
                form.style.display = 'none';
                successMessage.style.display = 'block';
                successMessage.innerHTML = `
                    <div style="text-align: center; padding: 1rem;">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981; margin-bottom: 1rem;">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <h3 style="margin-bottom: 0.5rem;">تم إنشاء الحساب بنجاح!</h3>
                        <p>لقد أرسلنا رابط تأكيد إلى بريدك الإلكتروني: <strong>${email}</strong></p>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary);">يرجى التحقق من بريدك وتفعيل الحساب لتتمكن من تسجيل الدخول.</p>
                        <a href="sign-in.html" class="btn btn-primary" style="margin-top: 1.5rem; display: inline-block; text-decoration: none;">الانتقال لتسجيل الدخول</a>
                    </div>
                `;

            } catch (err) {
                errorMessage.style.display = 'block';
                if (err.message.includes('already registered')) {
                    errorText.textContent = 'هذا البريد الإلكتروني مسجل بالفعل. يمكنك تسجيل الدخول بدلاً من ذلك.';
                } else {
                    errorText.textContent = err.message || 'فشل إنشاء الحساب. يرجى التأكد من البيانات والمحاولة مرة أخرى.';
                }
                setLoading(false);
            }
        });

        import { autoRedirect } from './auth-client.js';
        autoRedirect();
    </script>
</body>
</html>
