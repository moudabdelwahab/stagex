<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 5px;
        }
        .password-toggle svg {
            width: 20px;
            height: 20px;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding-left: 40px;
        }
    </style>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
</head>
<body class="auth-wrapper">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logo.svg" alt="Logo" class="logo-image">
                <span>منصة مدعوم</span>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <section class="auth-card">
            <h1>كلمة مرور جديدة</h1>
            <p class="auth-subtitle">يرجى إدخال كلمة المرور الجديدة الخاصة بك</p>

            <div id="successMessage" class="message-box message-success" style="display: none;">
                <p>تم تحديث كلمة المرور بنجاح! جاري تحويلك لتسجيل الدخول...</p>
            </div>

            <div id="errorMessage" class="message-box message-error" style="display: none;">
                <p id="errorText"></p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">كلمة المرور الجديدة</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="password" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">تأكيد كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordConfirm" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="passwordConfirm" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary" id="updateBtn">
                        <span id="updateBtnText">تحديث كلمة المرور</span>
                        <span id="updateBtnLoader" style="display: none;">جاري التحديث...</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script type="module">
        import { updatePassword } from './auth-client.js';

        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('updateBtn');
        const btnText = document.getElementById('updateBtnText');
        const btnLoader = document.getElementById('updateBtnLoader');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');

        // ميزة إظهار كلمة المرور
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                
                if (type === 'text') {
                    button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                } else {
                    button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                }
            });
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (password !== passwordConfirm) {
                errorMessage.style.display = 'block';
                errorText.textContent = 'كلمتا المرور غير متطابقتين';
                return;
            }

            setLoading(true);
            errorMessage.style.display = 'none';

            try {
                const { error } = await updatePassword(password);
                if (error) throw error;

                successMessage.style.display = 'block';
                setTimeout(() => {
                    window.location.replace('sign-in.html');
                }, 3000);
            } catch (err) {
                errorMessage.style.display = 'block';
                errorText.textContent = err.message || 'فشل تحديث كلمة المرور. قد يكون الرابط قد انتهت صلاحيته.';
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
