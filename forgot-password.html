<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
</head>
<body class="auth-wrapper">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logo.svg" alt="Logo" class="logo-image">
                <span>منصة مدعوم</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="sign-in.html">تسجيل الدخول</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <section class="auth-card">
            <h1>استعادة كلمة المرور</h1>
            <p class="auth-subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>

            <div id="successMessage" class="message-box message-success" style="display: none;">
                <p>تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني بنجاح!</p>
            </div>

            <div id="errorMessage" class="message-box message-error" style="display: none;">
                <p id="errorText"></p>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني المسجل" required>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary" id="resetBtn">
                        <span id="resetBtnText">إرسال رابط الاستعادة</span>
                        <span id="resetBtnLoader" style="display: none;">جاري الإرسال...</span>
                    </button>
                </div>
            </form>
            <p class="auth-footer-text">تذكرت كلمة المرور؟ <a href="sign-in.html">العودة لتسجيل الدخول</a></p>
        </section>
    </main>

    <script type="module">
        import { resetPasswordEmail } from './auth-client.js';

        const form = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('resetBtn');
        const btnText = document.getElementById('resetBtnText');
        const btnLoader = document.getElementById('resetBtnLoader');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const email = document.getElementById('email').value;

            try {
                const { error } = await resetPasswordEmail(email);
                if (error) throw error;

                successMessage.style.display = 'block';
                form.reset();
            } catch (err) {
                errorMessage.style.display = 'block';
                errorText.textContent = err.message || 'فشل إرسال البريد. يرجى المحاولة لاحقاً.';
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
