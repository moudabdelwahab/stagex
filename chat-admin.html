<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المحادثات - منصة مدعوم</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #003366;
            --secondary-color: #25D366;
            --light-bg: #f0f0f0;
            --white: #ffffff;
            --text-dark: #111111;
            --text-light: #667781;
            --border-color: #e5e5ea;
            --chat-bubble-user: #003366;
            --chat-bubble-other: #e5e5ea;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--white);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--white);
        }

        /* ===== SIDEBAR STYLING ===== */
        .chat-sidebar {
            width: 360px;
            background: var(--white);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.05);
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--light-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--primary-color);
        }

        .icon-btn:hover {
            background: #e5e5ea;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .search-box {
            padding: 0.75rem 1rem;
            margin: 0.5rem;
            background: var(--light-bg);
            border: none;
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-dark);
            width: calc(100% - 2rem);
        }

        .search-box::placeholder {
            color: var(--text-light);
        }

        .search-box:focus {
            outline: none;
            background: #e5e5ea;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .chat-item {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0 0.5rem;
            border-radius: 8px;
        }

        .chat-item:hover {
            background: var(--light-bg);
        }

        .chat-item.active {
            background: #f0f0f0;
            border-right: 3px solid var(--primary-color);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #0055aa);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }

        .status-open {
            background-color: #25D366;
        }

        .status-closed {
            background-color: #FF3B30;
        }

        .chat-time {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .chat-preview {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview.unread {
            color: var(--text-dark);
            font-weight: 600;
        }

        /* ===== MAIN CHAT AREA ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-align: center;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        /* ===== CHAT HEADER ===== */
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .chat-header-details h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .chat-header-details p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .chat-header-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* ===== MESSAGES AREA ===== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: var(--white);
        }

        .message-group {
            display: flex;
            margin-bottom: 0.5rem;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .message-group.sent {
            justify-content: flex-end;
        }

        .message-group.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            display: inline-block;
            text-align: right;
        }

        .message-bubble.sent {
            background: var(--chat-bubble-user);
            color: var(--white);
            border-bottom-right-radius: 2px;
        }

        .message-bubble.received {
            background: var(--chat-bubble-other);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            background: var(--white);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .input-field {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            max-height: 100px;
            color: var(--text-dark);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .input-field::placeholder {
            color: var(--text-light);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary-color);
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #002244;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ===== SCROLLBAR ===== */
        .chats-list::-webkit-scrollbar,
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .chats-list::-webkit-scrollbar-track,
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chats-list::-webkit-scrollbar-thumb,
        .messages-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .chats-list::-webkit-scrollbar-thumb:hover,
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* ===== MODAL STYLES ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-dark);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #002244;
        }

        .btn-secondary {
            background: var(--light-bg);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: #e5e5ea;
        }

        .btn-success {
            background: var(--secondary-color);
            color: var(--white);
        }

        .btn-success:hover {
            background: #20ba5a;
        }

        .btn-warning {
            background: #FF9800;
            color: var(--white);
        }

        .btn-warning:hover {
            background: #F57C00;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
            }

            .chat-main {
                display: none;
            }

            .chat-main.active {
                display: flex;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-10px); }
        }

        .recording-pulse {
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- SIDEBAR -->
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <h2>المحادثات</h2>
                <div class="header-actions">
                    <button class="icon-btn" id="newChatBtn" title="محادثة جديدة">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="settingsBtn" title="الإعدادات">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/>
                        </svg>
                    </button>
                </div>
            </div>

            <input type="text" class="search-box" id="searchInput" placeholder="ابحث عن محادثة...">

            <div class="chats-list" id="chatsList">
                <div style="padding: 2rem 1rem; text-align: center; color: var(--text-light);">
                    جاري تحميل المحادثات...
                </div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="chat-main" id="chatMain">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <h3>اختر محادثة للبدء</h3>
                <p>حدد محادثة من القائمة الجانبية لعرض الرسائل</p>
            </div>

            <!-- CHAT HEADER -->
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <div class="chat-avatar" id="headerAvatar">ع</div>
                    <div class="chat-header-details">
                        <h3 id="headerName">العميل</h3>
                        <p id="headerStatus">نشط الآن</p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" title="معلومات المحادثة">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="searchInChatBtn" title="البحث في المحادثة">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="exportSingleChatBtn" title="تصدير هذه المحادثة">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="closeChat" title="إغلاق">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- MESSAGES -->
            <div class="messages-container" id="messagesContainer">
                <!-- Messages will be added here -->
            </div>

            <!-- INPUT AREA -->
            <div class="chat-input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <button class="icon-btn" id="imageUploadBtn" title="إرسال صورة">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="voiceRecordBtn" title="تسجيل صوتي">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <input type="text" class="input-field" id="messageInput" placeholder="اكتب رسالة...">
                </div>
                <button class="send-btn" id="sendBtn" title="إرسال">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16346272 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99701575 L3.03521743,10.4380088 C3.03521743,10.5951061 3.34915502,10.7522035 3.50612381,10.7522035 L16.6915026,11.5376904 C16.6915026,11.5376904 17.1624089,11.5376904 17.1624089,12.0089825 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إعدادات البوت</h3>
                <button class="modal-close" id="closeSettingsModal">&times;</button>
            </div>
            <div class="form-group">
                <label>الرسالة الترحيبية</label>
                <textarea id="welcomeMsg" rows="3" placeholder="أهلاً بك! كيف يمكننا مساعدتك؟"></textarea>
            </div>
            <div class="form-group">
                <label>تأخير الرد (ثواني)</label>
                <input type="number" id="responseDelay" min="0" max="10" value="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelSettings">إلغاء</button>
                <button class="btn btn-primary" id="saveSettings">حفظ</button>
            </div>
        </div>
    </div>

    <!-- EXPORT MODAL -->
    <!-- SEARCH IN CHAT BAR -->
    <div id="searchChatBar" style="display: none; padding: 0.5rem 1rem; background: #f8f9fa; border-bottom: 1px solid var(--border-color); align-items: center; gap: 0.5rem;">
        <input type="text" id="searchChatInput" placeholder="ابحث في هذه المحادثة..." style="flex: 1; padding: 0.4rem 0.8rem; border: 1px solid var(--border-color); border-radius: 4px;">
        <button class="icon-btn" id="closeSearchChat" style="width: 30px; height: 30px;">&times;</button>
    </div>

    <!-- EXPORT SINGLE CHAT MODAL -->
    <div class="modal-overlay" id="exportSingleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>تصدير المحادثة الحالية</h3>
                <button class="modal-close" id="closeExportSingleModal">&times;</button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelExportSingle">إلغاء</button>
                <button class="btn btn-success" id="exportSingleExcel">Excel (العربية)</button>
                <button class="btn btn-primary" id="exportSinglePDF" style="background-color: #E91E63;">PDF</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>تصدير البيانات</h3>
                <button class="modal-close" id="closeExportModal">&times;</button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelExport">إلغاء</button>
                <button class="btn btn-success" id="exportExcel" style="display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V9h2v8zm4 0h-2v-4h2v4z"/>
                    </svg>
                    تصدير Excel
                </button>
