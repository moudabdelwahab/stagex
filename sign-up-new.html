<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة مدعوم</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .user-type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .user-type-btn {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .user-type-btn:hover {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }
        
        .user-type-btn.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-toggle {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 5px;
        }
        
        .password-toggle svg {
            width: 20px;
            height: 20px;
        }
        
        input[type="password"],
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select {
            width: 100%;
            padding-left: 40px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .user-type-selector {
                grid-template-columns: 1fr;
            }
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        
        .password-strength.weak {
            color: #ef4444;
        }
        
        .password-strength.medium {
            color: #f59e0b;
        }
        
        .password-strength.strong {
            color: #10b981;
        }
        
        .error-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .error-list li {
            padding: 0.25rem 0;
            color: #ef4444;
        }
    </style>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme-preference') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="theme-manager.js" defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-wrapper">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="/assets/images/logo.png" alt="Logo" class="logo-image">
                <span>منصة مدعوم</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" aria-label="Toggle theme" title="تبديل الوضع الليلي/النهاري">
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <ul class="nav-menu" style="display: flex; gap: 1.5rem; list-style: none; margin: 0; padding: 0;">
                    <li><a href="index.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">الرئيسية</a></li>
                    <li><a href="sign-in.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s;">تسجيل الدخول</a></li>
                    <li><a href="sign-up-new.html" style="color: var(--color-nav-text); text-decoration: none; transition: all 0.3s; font-weight: 600; border-bottom: 2px solid var(--color-nav-text);">حساب جديد</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <section class="auth-card">
            <h1>إنشاء حساب جديد</h1>
            <p class="auth-subtitle">انضم إلينا اليوم للحصول على أفضل دعم فني</p>

            <div id="successMessage" class="message-box message-success" style="display: none;">
                <p>تم إنشاء الحساب بنجاح! يرجى تأكيد بريدك الإلكتروني.</p>
            </div>

            <div id="errorMessage" class="message-box message-error" style="display: none;">
                <ul id="errorList" class="error-list"></ul>
            </div>

            <!-- اختيار نوع المستخدم -->
            <div class="user-type-selector">
                <button type="button" class="user-type-btn active" data-type="individual">
                    👤 فرد
                </button>
                <button type="button" class="user-type-btn" data-type="company">
                    🏢 شركة
                </button>
            </div>

            <!-- نموذج الفرد -->
            <form id="individualForm" class="form-section active">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول</label>
                        <input type="text" id="firstName" placeholder="الاسم الأول" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">الاسم الأخير</label>
                        <input type="text" id="lastName" placeholder="الاسم الأخير" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="individualEmail">البريد الإلكتروني</label>
                    <input type="email" id="individualEmail" placeholder="أدخل بريدك الإلكتروني" required>
                </div>

                <div class="form-group">
                    <label for="individualPhone">رقم الهاتف</label>
                    <input type="tel" id="individualPhone" placeholder="أدخل رقم هاتفك" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateOfBirth">تاريخ الميلاد (اختياري)</label>
                        <input type="date" id="dateOfBirth">
                    </div>
                    <div class="form-group">
                        <label for="gender">الجنس (اختياري)</label>
                        <select id="gender">
                            <option value="">اختر...</option>
                            <option value="male">ذكر</option>
                            <option value="female">أنثى</option>
                            <option value="other">أخرى</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="individualPassword">كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="individualPassword" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="individualPassword" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>

                <!-- Cloudflare Turnstile CAPTCHA -->
                <div class="form-group" style="margin-top: 1.5rem;">
                    <div class="cf-turnstile" 
                         data-sitekey="1x00000000000000000000AA"
                         data-theme="light"
                         data-size="normal"
                         id="turnstile-individual"></div>
                    <div id="turnstileErrorIndividual" class="message-box message-error" style="display:none; margin-top: 0.5rem;">
                        <p>يرجى إكمال التحقق من CAPTCHA</p>
                    </div>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary" id="individualSubmitBtn">
                        <span id="individualSubmitText">إنشاء الحساب</span>
                        <span id="individualSubmitLoader" style="display: none;">جاري الإنشاء...</span>
                    </button>
                </div>
            </form>

            <!-- نموذج الشركة -->
            <form id="companyForm" class="form-section">
                <div class="form-group">
                    <label for="companyName">اسم الشركة</label>
                    <input type="text" id="companyName" placeholder="اسم الشركة" required>
                </div>

                <div class="form-group">
                    <label for="commercialRegistration">رقم السجل التجاري</label>
                    <input type="text" id="commercialRegistration" placeholder="رقم السجل التجاري" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="companyEmail">البريد الإلكتروني للشركة</label>
                        <input type="email" id="companyEmail" placeholder="البريد الإلكتروني للشركة" required>
                    </div>
                    <div class="form-group">
                        <label for="companyPhone">رقم هاتف الشركة</label>
                        <input type="tel" id="companyPhone" placeholder="رقم هاتف الشركة" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="contactEmail">البريد الإلكتروني الشخصي</label>
                        <input type="email" id="contactEmail" placeholder="بريدك الإلكتروني" required>
                    </div>
                    <div class="form-group">
                        <label for="contactPhone">رقم هاتفك الشخصي</label>
                        <input type="tel" id="contactPhone" placeholder="رقم هاتفك" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">المدينة</label>
                        <input type="text" id="city" placeholder="المدينة" required>
                    </div>
                    <div class="form-group">
                        <label for="country">الدولة</label>
                        <input type="text" id="country" placeholder="الدولة" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">العنوان</label>
                    <input type="text" id="address" placeholder="العنوان الكامل" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="industry">المجال (اختياري)</label>
                        <input type="text" id="industry" placeholder="مثال: تكنولوجيا المعلومات">
                    </div>
                    <div class="form-group">
                        <label for="employeeCount">عدد الموظفين (اختياري)</label>
                        <input type="text" id="employeeCount" placeholder="مثال: 50-100">
                    </div>
                </div>

                <div class="form-group">
                    <label for="companyPassword">كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="companyPassword" placeholder="••••••••" required minlength="8">
                        <button type="button" class="password-toggle" data-target="companyPassword" aria-label="إظهار كلمة المرور">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div id="companyPasswordStrength" class="password-strength"></div>
                </div>

                <!-- Cloudflare Turnstile CAPTCHA -->
                <div class="form-group" style="margin-top: 1.5rem;">
                    <div class="cf-turnstile" 
                         data-sitekey="1x00000000000000000000AA"
                         data-theme="light"
                         data-size="normal"
                         id="turnstile-company"></div>
                    <div id="turnstileErrorCompany" class="message-box message-error" style="display:none; margin-top: 0.5rem;">
                        <p>يرجى إكمال التحقق من CAPTCHA</p>
                    </div>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary" id="companySubmitBtn">
                        <span id="companySubmitText">إنشاء حساب الشركة</span>
                        <span id="companySubmitLoader" style="display: none;">جاري الإنشاء...</span>
                    </button>
                </div>
            </form>

            <p class="auth-footer-text">لديك حساب بالفعل؟ <a href="sign-in.html">سجل دخولك هنا</a></p>
        </section>
    </main>

    <script type="module">
        import { signUpIndividual, signUpCompany } from './auth-user-types.js';
        import { validatePassword } from './auth-validation.js';
        import { getTurnstileToken, resetTurnstile } from './turnstile-config.js';

        let currentUserType = 'individual';

        // عناصر الواجهة
        const userTypeButtons = document.querySelectorAll('.user-type-btn');
        const individualForm = document.getElementById('individualForm');
        const companyForm = document.getElementById('companyForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorList = document.getElementById('errorList');
        const successMessage = document.getElementById('successMessage');

        // تبديل نوع المستخدم
        userTypeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                userTypeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentUserType = btn.dataset.type;

                document.querySelectorAll('.form-section').forEach(section => {
                    section.classList.remove('active');
                });

                if (currentUserType === 'individual') {
                    individualForm.classList.add('active');
                } else {
                    companyForm.classList.add('active');
                }
            });
        });

        // إظهار/إخفاء كلمة المرور
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
            });
        });

        // التحقق من قوة كلمة المرور
        document.getElementById('individualPassword').addEventListener('input', (e) => {
            const validation = validatePassword(e.target.value);
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (e.target.value.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            
            if (validation.isValid) {
                strengthDiv.textContent = '✓ كلمة مرور قوية';
                strengthDiv.className = 'password-strength strong';
            } else if (e.target.value.length >= 6) {
                strengthDiv.textContent = '⚠ كلمة مرور متوسطة';
                strengthDiv.className = 'password-strength medium';
            } else {
                strengthDiv.textContent = '✗ كلمة مرور ضعيفة';
                strengthDiv.className = 'password-strength weak';
            }
        });

        document.getElementById('companyPassword').addEventListener('input', (e) => {
            const validation = validatePassword(e.target.value);
            const strengthDiv = document.getElementById('companyPasswordStrength');
            
            if (e.target.value.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            
            if (validation.isValid) {
                strengthDiv.textContent = '✓ كلمة مرور قوية';
                strengthDiv.className = 'password-strength strong';
            } else if (e.target.value.length >= 6) {
                strengthDiv.textContent = '⚠ كلمة مرور متوسطة';
                strengthDiv.className = 'password-strength medium';
            } else {
                strengthDiv.textContent = '✗ كلمة مرور ضعيفة';
                strengthDiv.className = 'password-strength weak';
            }
        });

        // دالة عرض الأخطاء
        function showErrors(errors) {
            errorList.innerHTML = '';
            errors.forEach(error => {
                const li = document.createElement('li');
                li.textContent = error;
                errorList.appendChild(li);
            });
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        // دالة إخفاء الأخطاء
        function hideErrors() {
            errorMessage.style.display = 'none';
        }

        // نموذج الفرد
        individualForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideErrors();

            // التحقق من Turnstile Token
            const turnstileToken = await getTurnstileToken();
            if (!turnstileToken) {
                document.getElementById('turnstileErrorIndividual').style.display = 'block';
                resetTurnstile();
                return;
            }
            document.getElementById('turnstileErrorIndividual').style.display = 'none';

            const submitBtn = document.getElementById('individualSubmitBtn');
            const submitText = document.getElementById('individualSubmitText');
            const submitLoader = document.getElementById('individualSubmitLoader');

            submitBtn.disabled = true;
            submitText.style.display = 'none';
            submitLoader.style.display = 'inline';

            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('individualEmail').value,
                phone: document.getElementById('individualPhone').value,
                password: document.getElementById('individualPassword').value,
                dateOfBirth: document.getElementById('dateOfBirth').value || null,
                gender: document.getElementById('gender').value || null
            };

            const result = await signUpIndividual(data, { turnstileToken });

            if (result.success) {
                successMessage.style.display = 'block';
                individualForm.reset();
                resetTurnstile();
                setTimeout(() => {
                    window.location.href = 'sign-in.html';
                }, 2000);
            } else {
                const errors = result.error.split('\n').filter(e => e.trim());
                showErrors(errors);
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                submitLoader.style.display = 'none';
                resetTurnstile();
            }
        });

        // نموذج الشركة
        companyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideErrors();

            // التحقق من Turnstile Token
            const turnstileToken = await getTurnstileToken();
            if (!turnstileToken) {
                document.getElementById('turnstileErrorCompany').style.display = 'block';
                resetTurnstile();
                return;
            }
            document.getElementById('turnstileErrorCompany').style.display = 'none';

            const submitBtn = document.getElementById('companySubmitBtn');
            const submitText = document.getElementById('companySubmitText');
            const submitLoader = document.getElementById('companySubmitLoader');

            submitBtn.disabled = true;
            submitText.style.display = 'none';
            submitLoader.style.display = 'inline';

            const data = {
                companyName: document.getElementById('companyName').value,
                commercialRegistrationNumber: document.getElementById('commercialRegistration').value,
                companyEmail: document.getElementById('companyEmail').value,
                companyPhone: document.getElementById('companyPhone').value,
                email: document.getElementById('contactEmail').value,
                phone: document.getElementById('contactPhone').value,
                password: document.getElementById('companyPassword').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                country: document.getElementById('country').value,
                industry: document.getElementById('industry').value || null,
                employeeCount: document.getElementById('employeeCount').value || null
            };

            const result = await signUpCompany(data, { turnstileToken });

            if (result.success) {
                successMessage.style.display = 'block';
                companyForm.reset();
                resetTurnstile();
                setTimeout(() => {
                    window.location.href = 'sign-in.html';
                }, 2000);
            } else {
                const errors = result.error.split('\n').filter(e => e.trim());
                showErrors(errors);
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                submitLoader.style.display = 'none';
                resetTurnstile();
            }
        });
    </script>
</body>
</html>
